condor:
  jobname: infere_one_subj_tempeh_orig_coarse1
  submit:
    executable: "condor/tempeh.sh"
    arguments: "python tester/test_global.py \
                  --coarse_model_run_dir 'runs/coarse/coarse__one_subj_tempeh_orig__January30__14-57-22_coarse1' \
                  --data_list_fname './data/training_data/one_subj__all_seq_frames_per_seq_40_head_rot_120_train.json' \
                  --image_directory './data/training_data/downsampled_images_4' \
                  --calibration_directory './data/training_data/calibrations' \
                  --out_dir './runs/coarse/coarse__one_subj_tempeh_orig__January30__14-57-22_coarse1/train_inference'
                "
    description: "tempeh_${..jobname}"
    request_gpus: 1
    request_cpus: 16
    request_memory: 64000
    request_disk: "50G"
    requirements: '(TARGET.CUDADeviceName=="NVIDIA A100-SXM4-40GB") || (TARGET.CUDADeviceName=="NVIDIA A100-SXM4-80GB")'
    log_root: "logs/coarse/${..jobname}/$(ClusterId).$(Process)"
    error: "$(log_root).out"
    output: "$(log_root).out"
    log: "$(log_root).log"
    environment: "\"CONDOR_ClusterId=$(ClusterId) CONDOR_Process=$(Process) CONDOR_WorldSize=${.njobs} CONDOR_LOGFILE=$(log) CONDOR_OUTFILE=$(out) NUMEXPR_MAX_THREADS=128\""
    njobs: 1

