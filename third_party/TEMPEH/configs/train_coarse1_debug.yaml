# condor/run.py configs/train_coarse1_debug.yaml
# condor/submit.py 25 configs/train_coarse1_debug.yaml 
condor:
  jobname: tempeh_ava256_debug
  submit:
    executable: "condor/tempeh.sh"
    arguments: "python trainer/train_global.py \
                  --experiment-id ${..jobname} \
                  --config-filename /home/mprinzler/projects/gintern/TEMPEH/runs/coarse/coarse__tempeh_ava256__August28__19-15-01_backup/config.json \
                  --num-iterations 1000000 \
                  --weight-points2surface 10.0 \
                  --print-frequency 1 \
                  --visualize-frequency 10 \
                  --validate-frequency 10 \
                  --validation-steps 2 \
                  --train-data-list-fname /home/mprinzler/projects/gintern/TEMPEH/data/training_data/seventy_subj__all_seq_frames_per_seq_40_head_rot_120_train.json \
                  --val-data-list-fname /home/mprinzler/projects/gintern/TEMPEH/data/training_data/eight_subj__all_seq_frames_per_seq_5_val.json
                "
    description: "tempeh_${..jobname}"
    request_gpus: 1
    request_cpus: 16
    request_memory: 64000
    request_disk: "50G"
    requirements: '(TARGET.CUDADeviceName=="NVIDIA A100-SXM4-40GB") || (TARGET.CUDADeviceName=="NVIDIA A100-SXM4-80GB")'
    log_root: "logs/coarse/${..jobname}/$(ClusterId).$(Process)"
    error: "$(log_root).out"
    output: "$(log_root).out"
    log: "$(log_root).log"
    environment: "\"CONDOR_ClusterId=$(ClusterId) CONDOR_Process=$(Process) CONDOR_WorldSize=${.njobs} CONDOR_LOGFILE=$(log) CONDOR_OUTFILE=$(out) NUMEXPR_MAX_THREADS=128\""
    njobs: 1
  code_backup_root: "/is/cluster/mprinzler/.codebackups/TEMPEH"

