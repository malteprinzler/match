# condor/run.py configs/test_coarse.yaml
# condor/submit.py 25 configs/test_coarse.yaml
condor:
  jobname: test-coarse__tempeh_ava256_scale08_wedgeface10_all
  submit:
    executable: "condor/tempeh.sh"
    arguments: "python tester/test_global.py \
                  --coarse_model_run_dir /home/mprinzler/projects/gintern/TEMPEH/runs/coarse/coarse__tempeh_ava256_scale08_wedgeface10__September01__14-23-23 \
                  --data_list_fname ./data/training_data/seventy_subj__all_seq_frames_per_seq_40_head_rot_120_train.json \
                  --image_directory  ./data/training_data/train_images_4 \
                  --calibration_directory ./data/training_data/train_calibrations \
                  --out_dir ./results/ava256/${..jobname}
                "
    description: "tempeh_${..jobname}"
    request_gpus: 1
    request_cpus: 16
    request_memory: 64000
    request_disk: "50G"
    requirements: '(TARGET.CUDADeviceName=="NVIDIA A100-SXM4-40GB") || (TARGET.CUDADeviceName=="NVIDIA A100-SXM4-80GB")'
    log_root: "logs/coarse/${..jobname}/$(ClusterId).$(Process)"
    error: "$(log_root).out"
    output: "$(log_root).out"
    log: "$(log_root).log"
    environment: "\"CONDOR_ClusterId=$(ClusterId) CONDOR_Process=$(Process) CONDOR_WorldSize=${.njobs} CONDOR_LOGFILE=$(log) CONDOR_OUTFILE=$(out) NUMEXPR_MAX_THREADS=128\""
    njobs: 10
  code_backup_root: /is/cluster/mprinzler/.codebackups/TEMPEH
