# condor/run.py configs/train_fine_debug.yaml
# condor/submit.py 25 configs/train_fine_debug.yaml
condor:
  jobname: tempeh_fine_ava256_scale08_wedgeface10_debug
  submit:
    executable: "condor/tempeh.sh"
    arguments: "python trainer/train_local.py \
                  --experiment-id ${..jobname} \
                  --global-model-root-dir '/home/mprinzler/projects/gintern/TEMPEH/runs/coarse/coarse__tempeh_ava256_scale08_wedgeface10__September01__14-23-23' \
                  --global-registration-root-dir '/home/mprinzler/projects/gintern/TEMPEH/results/ava256/test-coarse__tempeh_ava256_scale08_wedgeface10' \
                  --num-iterations 150000 \
                  --print-frequency 1 \
                  --visualize-frequency 10 \
                  --validate-frequency 10 \
                  --validation-steps 10 \
                  --save-frequency 10
                "
    description: "tempeh_${..jobname}"
    request_gpus: 1
    request_cpus: 16
    request_memory: 64000
    request_disk: "50G"
    requirements: '(TARGET.CUDADeviceName=="NVIDIA A100-SXM4-40GB") || (TARGET.CUDADeviceName=="NVIDIA A100-SXM4-80GB")'
    log_root: "logs/coarse/${..jobname}/$(ClusterId).$(Process)"
    error: "$(log_root).out"
    output: "$(log_root).out"
    log: "$(log_root).log"
    environment: "\"CONDOR_ClusterId=$(ClusterId) CONDOR_Process=$(Process) CONDOR_WorldSize=${.njobs} CONDOR_LOGFILE=$(log) CONDOR_OUTFILE=$(out) NUMEXPR_MAX_THREADS=128\""
    njobs: 1
  code_backup_root: /is/cluster/mprinzler/.codebackups/TEMPEH
